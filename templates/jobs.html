{% extends "base.html" %}
{% block title %}Jobs — Job Discovery System{% endblock %}

{% block content %}

<!-- ─── Filter bar ──────────────────────────────────────── -->
<div class="filter-bar mb-3">
    <div class="row g-2 align-items-end">
        <div class="col-md-4">
            <label class="form-label text-muted mb-1" style="font-size:0.72rem">Search jobs</label>
            <div class="input-group input-group-sm">
                <span class="input-group-text bg-dark border-secondary">
                    <i class="bi bi-search text-muted"></i>
                </span>
                <input type="text" id="search-input" class="form-control"
                       placeholder="Java developer, cybersecurity..."
                       hx-get="/jobs/partial"
                       hx-trigger="keyup changed delay:400ms"
                       hx-target="#jobs-table-body"
                       hx-include="#filter-form"
                       name="q">
            </div>
        </div>
        <div class="col-md-2">
            <label class="form-label text-muted mb-1" style="font-size:0.72rem">Min Score</label>
            <input type="number" class="form-control form-control-sm"
                   id="min-score-input" name="min_score" value="0" min="0" max="100"
                   hx-get="/jobs/partial"
                   hx-trigger="change"
                   hx-target="#jobs-table-body"
                   hx-include="#filter-form">
        </div>
        <div class="col-md-2">
            <label class="form-label text-muted mb-1" style="font-size:0.72rem">Source</label>
            <select class="form-select form-select-sm" name="source" id="source-select"
                    hx-get="/jobs/partial"
                    hx-trigger="change"
                    hx-target="#jobs-table-body"
                    hx-include="#filter-form">
                <option value="">All sources</option>
                <option value="irishjobs">IrishJobs.ie</option>
                <option value="indeed">Indeed</option>
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label text-muted mb-1" style="font-size:0.72rem">Ghost filter</label>
            <select class="form-select form-select-sm" name="ghost" id="ghost-select"
                    hx-get="/jobs/partial"
                    hx-trigger="change"
                    hx-target="#jobs-table-body"
                    hx-include="#filter-form">
                <option value="">All jobs</option>
                <option value="false">Real jobs only</option>
                <option value="true">Ghosts only</option>
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label text-muted mb-1" style="font-size:0.72rem">Sort by</label>
            <select class="form-select form-select-sm" name="sort" id="sort-select"
                    hx-get="/jobs/partial"
                    hx-trigger="change"
                    hx-target="#jobs-table-body"
                    hx-include="#filter-form">
                <option value="score">Score (high→low)</option>
                <option value="date">Date (newest)</option>
                <option value="company">Company (A–Z)</option>
            </select>
        </div>
    </div>
</div>

<!-- Hidden form for HTMX include -->
<form id="filter-form" style="display:none">
    <input type="hidden" name="q"         id="q-hidden">
    <input type="hidden" name="min_score" id="min-score-hidden">
    <input type="hidden" name="source"    id="source-hidden">
    <input type="hidden" name="ghost"     id="ghost-hidden">
    <input type="hidden" name="sort"      id="sort-hidden">
</form>

<!-- ─── Jobs table ─────────────────────────────────────── -->
<div class="card-dark p-0">
    <div class="table-responsive">
        <table class="table table-borderless jobs-table mb-0">
            <thead>
                <tr class="border-bottom border-secondary border-opacity-10">
                    <th style="width:70px">Score</th>
                    <th>Job Title</th>
                    <th>Company</th>
                    <th>Location</th>
                    <th>Salary</th>
                    <th>Date</th>
                    <th>Source</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="jobs-table-body"
                   hx-get="/jobs/partial"
                   hx-trigger="load"
                   hx-target="#jobs-table-body"
                   hx-swap="innerHTML">
                <tr>
                    <td colspan="8" class="text-center py-4 text-muted">
                        <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                        Loading jobs...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
// Keep the hidden form in sync with the visible filter inputs
function syncFilters() {
    document.getElementById('q-hidden').value         = document.getElementById('search-input').value;
    document.getElementById('min-score-hidden').value  = document.getElementById('min-score-input').value;
    document.getElementById('source-hidden').value    = document.getElementById('source-select').value;
    document.getElementById('ghost-hidden').value     = document.getElementById('ghost-select').value;
    document.getElementById('sort-hidden').value      = document.getElementById('sort-select').value;
}
document.querySelectorAll('#search-input, #min-score-input, #source-select, #ghost-select, #sort-select')
    .forEach(el => el.addEventListener('change', syncFilters));
document.getElementById('search-input').addEventListener('keyup', syncFilters);
</script>
{% endblock %}
