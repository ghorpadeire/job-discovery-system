name: Scrape & Score Jobs

on:
  schedule:
    - cron: '0 7 * * *'    # 07:00 UTC = 08:00 Irish time
    - cron: '0 19 * * *'   # 19:00 UTC = 20:00 Irish time
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          # Ubuntu 24 (Noble) renamed libasound2 → libasound2t64; use --no-deps
          # and install the renamed package manually
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2t64 libgbm1 libnss3 libxss1 libatk-bridge2.0-0 \
            libgtk-3-0 libxcomposite1 libxdamage1 libxrandr2 \
            libpango-1.0-0 libcairo2 libatspi2.0-0
          playwright install chromium --no-deps

      - name: Scrape IrishJobs + Indeed
        run: python run_all.py
        env:
          DATABASE_URL:   ${{ secrets.DATABASE_URL }}
          REDIS_URL:      ${{ secrets.REDIS_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Score all jobs
        run: python score_jobs.py --rescore --no-career-check
        env:
          DATABASE_URL:   ${{ secrets.DATABASE_URL }}
          REDIS_URL:      ${{ secrets.REDIS_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
