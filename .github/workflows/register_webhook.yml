name: Register Telegram Webhook

on:
  push:
    paths:
      - '.github/workflows/register_webhook.yml'
  workflow_dispatch:

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - name: Register Telegram webhook with Render URL
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, sys
          token = "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          webhook_url = "https://job-web-ns0j.onrender.com/telegram/webhook"
          api = f"https://api.telegram.org/bot{token}/setWebhook"
          data = json.dumps({"url": webhook_url, "allowed_updates": ["message", "callback_query"]}).encode()
          req = urllib.request.Request(api, data=data, headers={"Content-Type": "application/json"})
          try:
              resp = urllib.request.urlopen(req, timeout=15)
              result = json.loads(resp.read())
              print("Webhook registration result:", result)
              if result.get("ok"):
                  print(f"SUCCESS: Webhook set to {webhook_url}")
              else:
                  print("FAILED:", result)
                  sys.exit(1)
          except Exception as e:
              print(f"ERROR: {e}")
              sys.exit(1)
          PYEOF
