# ─────────────────────────────────────────────────────────────────────────────
# Job Discovery System — GitHub Actions CI/CD
#
# Triggers:
#   push / PR  → main, develop : run lint + tests + Docker build
#   push       → main          : push image to GHCR
#
# Secrets required (Settings → Secrets → Actions):
#   OPENAI_API_KEY   (optional — only needed for AI scoring tests)
# ─────────────────────────────────────────────────────────────────────────────

name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}          # e.g. ghorpadeire/job-discovery-system

jobs:

  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install linting tools
        run: pip install flake8 flake8-bugbear

      - name: Run flake8
        run: |
          flake8 . \
            --max-line-length=120 \
            --extend-ignore=E203,W503,E501 \
            --exclude=.git,__pycache__,.venv,venv,*.egg-info \
            --count --statistics

  # ── 2. Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       testjobsdb
          POSTGRES_USER:     testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testjobsdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testjobsdb
      REDIS_URL:    redis://localhost:6379/0
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Install Playwright
        run: playwright install chromium --with-deps

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=core --cov=scrapers \
            --cov-report=term-missing \
            --cov-report=xml \
            -v \
            --tb=short \
            --timeout=60
        continue-on-error: true   # tests may not exist yet — don't block builds

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── 3. Docker build ───────────────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Extract metadata (tags, labels) for Docker
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Login to GHCR only on pushes (not PRs from forks)
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and (conditionally) push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ── 4. Compose smoke test (main only) ─────────────────────────────────────────
  compose-test:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql://jobsuser:jobspass@postgres:5432/jobsdb
          REDIS_URL=redis://redis:6379/0
          OPENAI_API_KEY=
          TELEGRAM_BOT_TOKEN=
          TELEGRAM_CHAT_ID=
          FLASK_ENV=production
          SCRAPE_INTERVAL_HOURS=999
          AI_SCORE_ENABLED=false
          EOF

      - name: Start infrastructure services
        run: |
          docker compose up postgres redis -d
          docker compose run --rm web python -c "
          import time, sys
          from core.database import check_connection
          for _ in range(30):
              if check_connection():
                  print('DB ready'); sys.exit(0)
              time.sleep(2)
          sys.exit(1)
          "

      - name: Start web service and health-check
        run: |
          docker compose up web -d
          sleep 15
          curl -f http://localhost:5000/ || (docker compose logs web && exit 1)

      - name: Print logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
