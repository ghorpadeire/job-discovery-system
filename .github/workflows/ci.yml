name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-check:
    name: Lint & Import Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: jobsdb
          POSTGRES_USER: jobsuser
          POSTGRES_PASSWORD: jobspass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check . --select E,F,W --ignore E501,E402,E701,E702,E712,E711

      - name: Verify core imports
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: jobsdb
          DB_USER: jobsuser
          DB_PASSWORD: jobspass
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          OPENAI_API_KEY: "sk-fake-for-ci"
          TELEGRAM_BOT_TOKEN: ""
          TELEGRAM_CHAT_ID: ""
        run: |
          python -c "from core.config import validate; print('config OK')"
          python -c "from core.database import get_engine; print('database OK')"
          python -c "from core.models import Job; print('models OK')"
          python -c "from core.cache import get_cache; print('cache OK')"
          python -c "from core.deduplicator import merge_duplicates; print('deduplicator OK')"
          python -c "from core.scorer import score_all_active_jobs; print('scorer OK')"
          python -c "from core.progress import emitter; print('progress OK')"
          python -c "from scrapers.base import BaseScraper; print('base scraper OK')"
          python -c "from scrapers.irishjobs import IrishJobsScraper; print('irishjobs OK')"
          python -c "from scrapers.indeed import IndeedScraper; print('indeed OK')"
          python -c "from scrapers.itjobs import ITJobsScraper; print('itjobs OK')"
          python -c "from scrapers.jobs_ie import JobsIEScraper; print('jobs_ie OK')"

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Verify DB connectivity
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: jobsdb
          DB_USER: jobsuser
          DB_PASSWORD: jobspass
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          OPENAI_API_KEY: "sk-fake-for-ci"
        run: |
          python -c "
          from core.database import check_connection, get_engine
          from core.models import Job
          assert check_connection(), 'DB connection failed'
          engine = get_engine()
          Job.metadata.create_all(engine)
          print('DB tables created OK')
          "
