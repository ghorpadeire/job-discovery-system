# railway.toml — Railway deployment config
# Deploys 3 background services from this repo:
#   scraper      → python services/scraper_loop.py
#   scorer       → python services/scorer_loop.py
#   telegram-bot → python telegram_bot.py
#
# All services use the same Dockerfile (includes Playwright + Chromium).
# Environment variables are set in the Railway dashboard per-service.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Default start command (overridden per service in Railway dashboard)
startCommand = "python services/scraper_loop.py"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
