# render.yaml — Render Blueprint for Job Discovery System
#
# Free-tier layout:
#   jobsdb              — Managed PostgreSQL (free, 90 days)
#   job-web             — Flask dashboard, native Python runtime (no Docker)
#   job-scrape-score    — Cron Job every 12h, Docker (needs Playwright)
#
# Why native Python for job-web?
#   The Docker image includes Playwright + Chromium (~400 MB) which the
#   dashboard never uses. Native Python gives a 10x faster build and avoids
#   Render free-tier build timeouts.
#
# Redis:
#   Create a free Upstash Redis at https://upstash.com → TCP tab → copy URL.
#   Paste it as REDIS_URL in the Render dashboard after first deploy.

databases:
  - name: jobsdb
    databaseName: jobsdb
    user: jobsuser
    plan: free

services:
  # ── Web dashboard — native Python (no Docker, no Playwright) ──────────────
  - type: web
    name: job-web
    env: python
    buildCommand: pip install -r requirements-web.txt
    startCommand: gunicorn --workers 2 --bind "0.0.0.0:$PORT" --timeout 120 dashboard:app
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobsdb
          property: connectionString
      - key: REDIS_URL
        sync: false       # Paste your Upstash rediss://... URL
      - key: OPENAI_API_KEY
        sync: false       # Optional — only for AI scoring
      - key: FLASK_ENV
        value: production
      - key: RENDER
        value: "true"

  # ── Scrape + Score Cron Job — Docker (Playwright needed for scraping) ──────
  - type: cron
    name: job-scrape-score
    env: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: sh -c "python run_all.py && python score_jobs.py --rescore"
    schedule: "0 */12 * * *"    # 00:00 and 12:00 UTC every day
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobsdb
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_SCORE_ENABLED
        value: "false"
