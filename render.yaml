services:
  # ── Free web service: Flask dashboard + Telegram webhook ────────
  - type: web
    name: job-web
    env: python
    plan: free
    buildCommand: pip install -r requirements-web.txt
    startCommand: gunicorn dashboard:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FLASK_SECRET
        generateValue: true

  # ── Paid background worker ($7/month) — NOT deployed by default ─
  # Uncomment below only if you want 24/7 persistent Telegram polling.
  # The free GitHub Actions + webhook approach is recommended instead.
