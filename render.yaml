# render.yaml -- Blueprint for one-click Render deployment
# Docs: https://render.com/docs/blueprint-spec
#
# To deploy the Telegram bot as a Background Worker on Render:
#   dashboard.render.com -> New -> Background Worker -> Connect repo
#   -> Runtime: Python -> Build: pip install -r requirements-notify.txt
#   -> Start: python telegram_bot.py
#   -> Add env vars: DATABASE_URL, REDIS_URL, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

services:
  - type: web
    name: job-web
    runtime: python
    buildCommand: pip install -r requirements-web.txt
    startCommand: gunicorn dashboard:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: worker
    name: job-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python telegram_bot.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
