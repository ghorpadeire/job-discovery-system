# render.yaml — Render Blueprint for Job Discovery System
#
# Free-tier layout (Render free only supports Web + PostgreSQL):
#   jobsdb    — Managed PostgreSQL (free, 90 days)
#   job-web   — Flask dashboard, native Python runtime
#
# Scraping is run locally:
#   py run_all.py         (writes to Render PostgreSQL via DATABASE_URL)
#   py score_jobs.py --rescore
#
# Redis:
#   Free Upstash Redis at https://upstash.com → TCP tab → copy URL.
#   Set it as REDIS_URL in the Render dashboard after deploy.

databases:
  - name: jobsdb
    databaseName: jobsdb
    user: jobsuser
    plan: free

services:
  - type: web
    name: job-web
    env: python
    buildCommand: pip install -r requirements-web.txt
    startCommand: gunicorn --workers 2 --bind "0.0.0.0:$PORT" --timeout 120 dashboard:app
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobsdb
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: RENDER
        value: "true"
