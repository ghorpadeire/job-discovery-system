name: Telegram Notifications

on:
  schedule:
    - cron: '5 9 * * *'      # Daily digest at 09:05 UTC (10:05 Irish time)
    - cron: '*/30 * * * *'   # Alert poller every 30 minutes
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: digest or alerts'
        required: true
        default: alerts

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lightweight dependencies
        run: pip install -r requirements-notify.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "09" ]; then
              echo "mode=digest" >> $GITHUB_OUTPUT
            else
              echo "mode=alerts" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Send Telegram notification
        run: python tg_notify.py --${{ steps.mode.outputs.mode }}
        env:
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
          REDIS_URL:            ${{ secrets.REDIS_URL }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
