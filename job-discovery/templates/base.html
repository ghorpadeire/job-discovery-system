<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Discovery System{% endblock %}</title>

    <!-- Bootstrap 5.3 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- HTMX 2.0 -->
    <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js" defer></script>

    <style>
        :root {
            --sidebar-width: 220px;
            --sidebar-bg: #0f1117;
            --topbar-height: 56px;
            --accent: #4f8ef7;
        }

        body { background: #13151c; color: #e2e8f0; font-size: 0.875rem; }

        /* ── Sidebar ─────────────────────────────────────── */
        #sidebar {
            width: var(--sidebar-width);
            min-height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(255,255,255,0.07);
            position: fixed;
            top: 0; left: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        #sidebar .logo {
            padding: 1.2rem 1.25rem;
            font-weight: 700;
            font-size: 1rem;
            color: var(--accent);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            letter-spacing: 0.5px;
        }

        #sidebar .logo span { color: #e2e8f0; font-weight: 400; }

        #sidebar nav { padding: 0.75rem 0; flex: 1; }

        #sidebar .nav-link {
            color: #94a3b8;
            padding: 0.55rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border-radius: 0;
            transition: background 0.15s, color 0.15s;
            font-size: 0.85rem;
        }

        #sidebar .nav-link:hover,
        #sidebar .nav-link.active {
            color: #e2e8f0;
            background: rgba(79, 142, 247, 0.12);
        }

        #sidebar .nav-link.active {
            border-left: 3px solid var(--accent);
            padding-left: calc(1.25rem - 3px);
            color: var(--accent);
        }

        #sidebar .nav-link i { font-size: 1rem; width: 20px; text-align: center; }

        #sidebar .sidebar-footer {
            padding: 0.75rem 1.25rem;
            border-top: 1px solid rgba(255,255,255,0.07);
            color: #475569;
            font-size: 0.75rem;
        }

        /* ── Main content ────────────────────────────────── */
        #main-content {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
        }

        .topbar {
            height: var(--topbar-height);
            background: var(--sidebar-bg);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .page-body { padding: 1.5rem; }

        /* ── Cards ───────────────────────────────────────── */
        .stat-card {
            background: #1a1d27;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            padding: 1.1rem 1.25rem;
            height: 100%;
        }

        .stat-card .stat-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #64748b;
            margin-bottom: 0.35rem;
        }

        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
            color: #e2e8f0;
        }

        .stat-card .stat-sub {
            font-size: 0.72rem;
            color: #64748b;
            margin-top: 0.25rem;
        }

        /* ── Score badges ────────────────────────────────── */
        .score-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .score-very-high  { background: rgba(34,197,94,0.15);  color: #22c55e; }
        .score-high       { background: rgba(234,179,8,0.15);   color: #eab308; }
        .score-medium     { background: rgba(59,130,246,0.15);  color: #3b82f6; }
        .score-low        { background: rgba(239,68,68,0.15);   color: #ef4444; }
        .score-unscored   { background: rgba(100,116,139,0.15); color: #64748b; }

        /* ── Table ───────────────────────────────────────── */
        .jobs-table { font-size: 0.82rem; }
        .jobs-table th { color: #64748b; font-weight: 500; font-size: 0.72rem;
                         text-transform: uppercase; letter-spacing: 0.6px; }
        .jobs-table td { vertical-align: middle; border-color: rgba(255,255,255,0.05); }
        .jobs-table tr:hover td { background: rgba(79,142,247,0.05); cursor: pointer; }

        /* ── Filter bar ──────────────────────────────────── */
        .filter-bar { background: #1a1d27; border-radius: 10px;
                      padding: 1rem 1.25rem; margin-bottom: 1rem; }
        .filter-bar .form-control,
        .filter-bar .form-select {
            background: #0f1117;
            border-color: rgba(255,255,255,0.1);
            color: #e2e8f0;
            font-size: 0.82rem;
        }
        .filter-bar .form-control::placeholder { color: #475569; }

        /* ── Signal bars ─────────────────────────────────── */
        .signal-row { margin-bottom: 0.6rem; }
        .signal-name { font-size: 0.78rem; color: #94a3b8; width: 180px; }
        .signal-bar-bg { background: rgba(255,255,255,0.06); border-radius: 4px;
                         height: 6px; flex: 1; }
        .signal-bar-fill { height: 100%; border-radius: 4px; }

        /* ── Kanban ──────────────────────────────────────── */
        .kanban-col { background: #1a1d27; border-radius: 10px; min-height: 300px; }
        .kanban-col-header { padding: 0.75rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.07);
                             font-size: 0.78rem; font-weight: 600; text-transform: uppercase;
                             letter-spacing: 0.8px; }
        .kanban-card { background: #0f1117; border-radius: 8px; padding: 0.75rem;
                       margin: 0.5rem; font-size: 0.8rem; cursor: pointer;
                       border: 1px solid rgba(255,255,255,0.06); }
        .kanban-card:hover { border-color: rgba(79,142,247,0.4); }

        /* ── Source pills ────────────────────────────────── */
        .source-irishjobs { background: rgba(16,185,129,0.15); color: #10b981; }
        .source-indeed    { background: rgba(124,58,237,0.15);  color: #7c3aed; }

        /* ── Ghost badge ─────────────────────────────────── */
        .ghost-badge { background: rgba(239,68,68,0.12); color: #ef4444;
                       font-size: 0.68rem; padding: 1px 6px; border-radius: 10px; }

        /* ── Misc ────────────────────────────────────────── */
        a { color: var(--accent); }
        a:hover { color: #7aabff; }
        .text-muted { color: #64748b !important; }
        .section-title { font-size: 0.78rem; font-weight: 600; text-transform: uppercase;
                         letter-spacing: 0.8px; color: #64748b; margin-bottom: 0.75rem; }
        .card-dark { background: #1a1d27; border: 1px solid rgba(255,255,255,0.07);
                     border-radius: 10px; }
    </style>

    {% block head %}{% endblock %}
</head>
<body>

<!-- ─── Sidebar ──────────────────────────────────────────────── -->
<div id="sidebar">
    <div class="logo">
        <i class="bi bi-search-heart"></i>&nbsp;
        Job<span>Scout</span>
    </div>
    <nav>
        <a href="/"         class="nav-link {% if request.endpoint=='index' %}active{% endif %}">
            <i class="bi bi-house"></i> Home
        </a>
        <a href="/jobs"     class="nav-link {% if request.endpoint in ('jobs','jobs_partial') %}active{% endif %}">
            <i class="bi bi-briefcase"></i> Jobs
        </a>
        <a href="/companies" class="nav-link {% if request.endpoint=='companies' %}active{% endif %}">
            <i class="bi bi-building"></i> Companies
        </a>
        <a href="/tracker" class="nav-link {% if request.endpoint=='tracker' %}active{% endif %}">
            <i class="bi bi-kanban"></i> Tracker
        </a>
    </nav>
    <div class="sidebar-footer">
        <i class="bi bi-database"></i> JobScout v2.0<br>
        <i class="bi bi-geo-alt"></i> Dublin, Ireland
    </div>
</div>

<!-- ─── Main content ─────────────────────────────────────────── -->
<div id="main-content">
    <div class="topbar">
        <i class="bi bi-search-heart text-primary me-2"></i>
        <span class="fw-semibold">Job Discovery System</span>
        <span class="ms-2 text-muted">— Ghost job filter &amp; legitimacy scorer</span>
        <div class="ms-auto d-flex gap-2">
            <span class="badge bg-dark border border-secondary text-muted">
                <i class="bi bi-circle-fill text-success" style="font-size:0.5rem"></i>
                &nbsp;Live
            </span>
        </div>
    </div>

    <div class="page-body">
        {% if error is defined and error %}
        <div class="alert alert-danger">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
