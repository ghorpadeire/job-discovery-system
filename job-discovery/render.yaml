services:
  - type: web
    name: job-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: gunicorn dashboard:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FLASK_SECRET
        generateValue: true
